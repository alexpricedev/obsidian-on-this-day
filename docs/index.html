<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Opening in Obsidian…</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f6f6f4;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #1a1a1a;
      }
      .card {
        text-align: center;
        padding: 32px 24px;
        max-width: 360px;
      }
      h1 { font-size: 18px; margin: 0 0 6px; }
      p { font-size: 14px; line-height: 1.5; color: #666; margin: 0 0 20px; }
      a.btn {
        display: inline-block;
        padding: 10px 18px;
        background: #6c4cf0;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        border-radius: 8px;
      }
      .muted { font-size: 12px; color: #aaa; margin-top: 16px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Opening in Obsidian…</h1>
      <p id="status">If nothing happens, tap the button below.</p>
      <a class="btn" id="open" href="#">Open in Obsidian ↗</a>
      <div class="muted" id="err"></div>
    </div>
    <script>
      // Reconstruct the obsidian:// deep link from ?vault=&file= query params.
      // The email links here over https (so Proton/Gmail keep the link); this
      // page hands off to the obsidian:// custom protocol, which the browser can
      // open even though email clients strip it.
      (function () {
        var p = new URLSearchParams(location.search);
        var vault = p.get("vault");
        var file = p.get("file");
        if (!vault || !file) {
          document.getElementById("status").textContent =
            "Missing link details.";
          document.getElementById("open").style.display = "none";
          return;
        }
        var uri =
          "obsidian://open?vault=" +
          encodeURIComponent(vault) +
          "&file=" +
          encodeURIComponent(file);
        document.getElementById("open").setAttribute("href", uri);
        // Auto-forward. Some browsers block this without a user gesture; the
        // button is the fallback.
        location.replace(uri);
      })();
    </script>
  </body>
</html>
